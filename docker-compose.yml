version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ksh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ksh_db
      POSTGRES_USER: ksh_user
      POSTGRES_PASSWORD: ksh_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ksh_user -d ksh_db"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
